version: '3.8'

# Docker Compose para SYMYAH - Versão Light (t3.small - 2GB RAM)
# Otimizado para baixo consumo de memória

services:
  # =========================================================================
  # PostgreSQL com pgvector - Configurado para baixa memória
  # =========================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: symyah-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-symyah_db}
      POSTGRES_USER: ${POSTGRES_USER:-symyah_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Otimizações de memória para PostgreSQL
      POSTGRES_INITDB_ARGS: "-N 200"
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 512MB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_MAX_CONNECTIONS: "50"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/metrics_schema.sql:/docker-entrypoint-initdb.d/2-metrics.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-symyah_user} -d ${POSTGRES_DB:-symyah_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - symyah_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # =========================================================================
  # API Backend (FastAPI) - Single worker para economizar memória
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symyah-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-symyah_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-symyah_db}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      HOST: 0.0.0.0
      PORT: 8000
      RAG_TOP_K: ${RAG_TOP_K:-3}
      RAG_MIN_SIMILARITY: ${RAG_MIN_SIMILARITY:-0.5}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-3.5-turbo}
      # Otimizações para baixa memória
      TOKENIZERS_PARALLELISM: "false"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - symyah_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  postgres_data:
    driver: local

networks:
  symyah_network:
    driver: bridge
