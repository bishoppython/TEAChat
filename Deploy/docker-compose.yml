version: '3.8'

# Docker Compose para SYMYAH - Produção em EC2 AWS
# Este arquivo configura todos os serviços necessários para execução em produção

services:
  # =========================================================================
  # Banco de dados PostgreSQL com pgvector
  # =========================================================================
  postgres:
    image: ankane/pgvector:latest
    container_name: symyah-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-symyah_db}
      POSTGRES_USER: ${POSTGRES_USER:-symyah_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/metrics_schema.sql:/docker-entrypoint-initdb.d/2-metrics.sql
    ports:
      - "127.0.0.1:5432:5432"  # Apenas localhost para segurança
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-symyah_user} -d ${POSTGRES_DB:-symyah_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - symyah_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # =========================================================================
  # API Backend (FastAPI)
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symyah-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-symyah_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-symyah_db}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      HOST: 0.0.0.0
      PORT: 8000
      RAG_TOP_K: ${RAG_TOP_K:-4}
      RAG_MIN_SIMILARITY: ${RAG_MIN_SIMILARITY:-0.5}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-3.5-turbo}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - symyah_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # =========================================================================
  # Frontend Flask (Interface Web)
  # =========================================================================
  frontend:
    build:
      context: ./frontFlask
      dockerfile: Dockerfile
    container_name: symyah-frontend
    environment:
      BACKEND_URL: http://api:8000
      SECRET_KEY: ${SECRET_KEY}
      FLASK_ENV: production
    depends_on:
      - api
    networks:
      - symyah_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # =========================================================================
  # Nginx - Reverse Proxy (Opcional - para produção)
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: symyah-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - symyah_network
    restart: unless-stopped
    profiles:
      - with-nginx  # Execute com: docker-compose --profile with-nginx up

volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  symyah_network:
    driver: bridge
