# ============================================================
# GitHub Actions - CI (Testes e Validação)
# ============================================================
# Este workflow é acionado automaticamente a cada pull request
# ou push em branches de desenvolvimento para rodar testes.
# ============================================================

name: CI - Testes e Validação

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - dev
  push:
    branches:
      - develop
      - dev
      - feature/**
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # Job 1: Lint e Type Check
  # ============================================================
  lint-and-type:
    name: Lint e Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy black isort
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Flake8 (Linting)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true
      
      - name: Black (Formatação)
        run: |
          black --check .
        continue-on-error: true
      
      - name: Isort (Imports)
        run: |
          isort --check-only .
        continue-on-error: true

  # ============================================================
  # Job 2: Testes Unitários
  # ============================================================
  test:
    name: Testes Unitários
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Rodar testes com pytest
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html || echo "Nenhum teste encontrado"
        continue-on-error: true
      
      - name: Upload cobertura de testes
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        if: success()
        continue-on-error: true

  # ============================================================
  # Job 3: Build da Imagem Docker (Validação)
  # ============================================================
  docker-build:
    name: Build Docker (Validação)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Build da imagem Docker
        run: |
          docker build \
            --tag symyah-api:test \
            --file Dockerfile \
            .
      
      - name: Testar imagem Docker
        run: |
          docker run --rm symyah-api:test python --version
      
      - name: Limpeza
        run: |
          docker rmi symyah-api:test || true

  # ============================================================
  # Job 4: Segurança (Dependências)
  # ============================================================
  security:
    name: Segurança - Dependências
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Instalar pip-audit
        run: |
          pip install pip-audit
      
      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
      
      - name: Auditar dependências
        run: |
          pip-audit || echo "⚠️  Vulnerabilidades encontradas"
        continue-on-error: true

  # ============================================================
  # Job 5: Validação de Schema do Banco
  # ============================================================
  validate-schema:
    name: Validar Schema do Banco
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Validar scripts de schema
        run: |
          if [ -f database/schema.sql ]; then
            echo "✅ schema.sql encontrado"
            PGPASSWORD=test psql -h localhost -U test -d test_db -f database/schema.sql || echo "⚠️  Erro no schema"
          fi
          
          if [ -f database/metrics_schema.sql ]; then
            echo "✅ metrics_schema.sql encontrado"
            PGPASSWORD=test psql -h localhost -U test -d test_db -f database/metrics_schema.sql || echo "⚠️  Erro no metrics schema"
          fi
        continue-on-error: true
