# ============================================================
# GitHub Actions - Deploy Automático para AWS App Runner
# ============================================================
# Este workflow é acionado automaticamente a cada push na
# branch main/master e faz deploy da aplicação na AWS.
#
# Fluxo:
#   1. Checkout do código
#   2. Configurar credenciais AWS
#   3. Login no Amazon ECR
#   4. Build da imagem Docker
#   5. Push da imagem para o ECR
#   6. Atualizar App Runner com nova versão
# ============================================================

name: Deploy para AWS App Runner

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  
  # Permite acionamento manual
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_API: symyah-api
  ECR_REPOSITORY_FRONTEND: symyah-frontend
  APP_RUNNER_SERVICE_NAME: symyah-api
  IMAGE_TAG: latest

jobs:
  # ============================================================
  # Job 1: Build e Push da API
  # ============================================================
  build-and-push-api:
    name: Build e Push API
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}:${{ env.IMAGE_TAG }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      # 1. Checkout do código
      - name: Checkout do código
        uses: actions/checkout@v4
      
      # 2. Configurar AWS Credentials
      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      # 3. Login no Amazon ECR
      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      # 4. Build da imagem Docker
      - name: Build da imagem Docker
        id: build
        run: |
          docker build \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}:${{ env.IMAGE_TAG }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}:${{ github.sha }} \
            --file Dockerfile \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VCS_REF=${{ github.sha }} \
            .
      
      # 5. Push da imagem para o ECR
      - name: Push da imagem para o ECR
        run: |
          docker push --all-tags ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}
      
      # 6. Scan de segurança (opcional)
      - name: Scan de vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_API }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-results-api.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      
      # 7. Upload do resultado do scan
      - name: Upload do scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-api.sarif'
        if: always()
        continue-on-error: true

  # ============================================================
  # Job 2: Build e Push do Frontend (opcional)
  # ============================================================
  build-and-push-frontend:
    name: Build e Push Frontend
    runs-on: ubuntu-latest
    needs: build-and-push-api
    if: hashFiles('frontFlask/Dockerfile') != ''
    outputs:
      image_uri: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ env.IMAGE_TAG }}
    
    steps:
      # 1. Checkout do código
      - name: Checkout do código
        uses: actions/checkout@v4
      
      # 2. Configurar AWS Credentials
      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      # 3. Login no Amazon ECR
      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      # 4. Build da imagem Docker
      - name: Build da imagem Docker
        id: build
        run: |
          docker build \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ env.IMAGE_TAG }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }} \
            --file frontFlask/Dockerfile \
            frontFlask
      
      # 5. Push da imagem para o ECR
      - name: Push da imagem para o ECR
        run: |
          docker push --all-tags ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}

  # ============================================================
  # Job 3: Deploy no App Runner
  # ============================================================
  deploy-apprunner:
    name: Deploy no App Runner
    runs-on: ubuntu-latest
    needs: build-and-push-api
    environment: production
    
    steps:
      # 1. Checkout do código
      - name: Checkout do código
        uses: actions/checkout@v4
      
      # 2. Configurar AWS Credentials
      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      # 3. Obter URI da imagem do ECR
      - name: Obter URI da imagem
        id: image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "image_uri=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_API }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
          echo "Registry: ${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "Repository: ${{ env.ECR_REPOSITORY_API }}"
          echo "Tag: ${{ env.IMAGE_TAG }}"
      
      # 4. Verificar se serviço existe
      - name: Verificar serviço App Runner
        id: service
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --region ${{ env.AWS_REGION }} \
            --query "Services[?ServiceName=='${{ env.APP_RUNNER_SERVICE_NAME }}'].ServiceArn" \
            --output text)
          
          if [ "$SERVICE_ARN" == "None" ] || [ -z "$SERVICE_ARN" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ Serviço não encontrado. Execute deploy manual primeiro."
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "service_arn=$SERVICE_ARN" >> $GITHUB_OUTPUT
            echo "✅ Serviço encontrado: $SERVICE_ARN"
          fi
      
      # 5. Atualizar serviço App Runner
      - name: Atualizar App Runner
        if: steps.service.outputs.exists == 'true'
        run: |
          echo "🚀 Atualizando serviço App Runner..."
          
          aws apprunner update-service \
            --service-arn ${{ steps.service.outputs.service_arn }} \
            --source-configuration ImageRepository=\
Type=ECR,\
ImageIdentifier=${{ steps.image.outputs.image_uri }},\
ImageConfiguration=\
{Port=8000,\
Runtime=python3,\
StartCommand="uvicorn app:app --host 0.0.0.0 --port 8000",\
EnvironmentVariables=\
[{Name=DATABASE_URL,Value="${{ secrets.DATABASE_URL }}"},\
{Name=GOOGLE_API_KEY,Value="${{ secrets.GOOGLE_API_KEY }}"},\
{Name=SECRET_KEY,Value="${{ secrets.SECRET_KEY }}"},\
{Name=HOST,Value="0.0.0.0"},\
{Name=PORT,Value="8000"},\
{Name=RAG_TOP_K,Value="4"},\
{Name=RAG_MIN_SIMILARITY,Value="0.5"}]} \
            --instance-configuration Cpu=1024,Memory=2048 \
            --region ${{ env.AWS_REGION }}
          
          echo "✅ Serviço atualizado com sucesso!"
      
      # 6. Aguardar deploy
      - name: Aguardar deploy
        if: steps.service.outputs.exists == 'true'
        run: |
          echo "⏳ Aguardando deploy do App Runner..."
          
          MAX_ATTEMPTS=20
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            SERVICE_STATUS=$(aws apprunner describe-service \
              --service-arn ${{ steps.service.outputs.service_arn }} \
              --region ${{ env.AWS_REGION }} \
              --query Service.Status --output text 2>/dev/null || echo "UNKNOWN")
            
            echo "   Status: $SERVICE_STATUS ($(($ATTEMPT + 1))/$MAX_ATTEMPTS)"
            
            if [ "$SERVICE_STATUS" == "RUNNING" ]; then
              echo "✅ Deploy concluído com sucesso!"
              break
            elif [ "$SERVICE_STATUS" == "FAILED" ]; then
              echo "❌ Erro no deploy do serviço"
              exit 1
            fi
            
            sleep 30
            ATTEMPT=$((ATTEMPT + 1))
          done
      
      # 7. Obter URL do serviço
      - name: Obter URL do serviço
        if: steps.service.outputs.exists == 'true'
        id: url
        run: |
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn ${{ steps.service.outputs.service_arn }} \
            --region ${{ env.AWS_REGION }} \
            --query Service.ServiceUrl --output text)
          
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo ""
          echo "============================================"
          echo "🎉 Deploy concluído com sucesso!"
          echo "============================================"
          echo "🌐 URL do serviço: https://$SERVICE_URL"
          echo "📊 Health check: https://$SERVICE_URL/health"
          echo "============================================"
      
      # 8. Testar health check
      - name: Testar health check
        if: steps.service.outputs.exists == 'true'
        run: |
          echo "🧪 Testando health check..."
          
          HEALTH_URL="https://${{ steps.url.outputs.service_url }}/health"
          
          # Aguardar serviço estar pronto
          sleep 10
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL || echo "000")
          
          if [ "$RESPONSE" == "200" ]; then
            echo "✅ Health check passed (HTTP $RESPONSE)"
          else
            echo "⚠️  Health check retornou HTTP $RESPONSE"
            echo "   Isso pode ser normal se a API não tiver endpoint /health"
          fi

  # ============================================================
  # Job 4: Notificação (opcional)
  # ============================================================
  notify:
    name: Notificar Resultado
    runs-on: ubuntu-latest
    needs: [build-and-push-api, deploy-apprunner]
    if: always()
    
    steps:
      - name: Resultado do Deploy
        run: |
          echo "============================================"
          echo "📊 RESULTADO DO DEPLOY"
          echo "============================================"
          echo ""
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          
          if [ "${{ needs.deploy-apprunner.result }}" == "success" ]; then
            echo "✅ Status: SUCESSO"
          elif [ "${{ needs.deploy-apprunner.result }}" == "failure" ]; then
            echo "❌ Status: FALHOU"
          else
            echo "⚠️  Status: ${{ needs.deploy-apprunner.result }}"
          fi
          
          echo ""
          echo "============================================"
